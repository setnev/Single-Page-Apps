<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Markdown Editor</title>
<style>
  /* ============================================================
     THEME / DESIGN TOKENS
     ============================================================ */
  :root {
    --bg: #0f172a;          /* page background */
    --panel: #1e293b;       /* primary panel */
    --panel-2: #273449;     /* secondary panel / hover */
    --accent: #38bdf8;      /* accent (links, active) */
    --text: #e2e8f0;        /* main text */
    --muted: #94a3b8;       /* muted text */
    --border: #334155;      /* subtle borders */
    --radius: 10px;
    --radius-sm: 6px;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas,
            "Liberation Mono", monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial,
            sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ============================================================
     TOP BAR
     ============================================================ */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  header h1 {
    font-size: 16px;
    margin: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  header h1 .logo { color: var(--accent); }

  .spacer { flex: 1; }

  /* Generic button styling */
  button, .btn {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 7px 11px;
    font-size: 13px;
    font-family: var(--sans);
    cursor: pointer;
    transition: background .12s, border-color .12s;
    white-space: nowrap;
  }
  button:hover, .btn:hover {
    background: #31425c;
    border-color: var(--accent);
  }
  button:active { transform: translateY(1px); }

  .btn-accent {
    background: var(--accent);
    color: #08263a;
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn-accent:hover { background: #5fcdfb; }

  /* ============================================================
     LAYOUT
     ============================================================ */
  .app {
    flex: 1;
    display: flex;
    min-height: 0;          /* allow children to scroll */
  }

  /* ---- Sidebar (document list) ---- */
  .sidebar {
    width: 240px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .sidebar-head {
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-head h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
    margin: 0;
    flex: 1;
  }
  .doc-list {
    list-style: none;
    margin: 0;
    padding: 6px;
    overflow-y: auto;
    flex: 1;
  }
  .doc-item {
    padding: 9px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 2px;
  }
  .doc-item:hover { background: var(--panel-2); }
  .doc-item.active {
    background: var(--panel-2);
    outline: 1px solid var(--accent);
  }
  .doc-item .title {
    font-size: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .doc-item .meta {
    font-size: 11px;
    color: var(--muted);
  }

  /* ---- Editor / Preview split ---- */
  .panes {
    flex: 1;
    display: flex;
    min-width: 0;
    min-height: 0;
  }
  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
  }
  .pane + .pane { border-left: 1px solid var(--border); }

  .pane-head {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    flex-wrap: wrap;
  }

  /* Toolbar buttons (compact) */
  .toolbar button {
    padding: 5px 9px;
    font-size: 13px;
  }
  .toolbar {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  /* Editor textarea */
  #editor {
    flex: 1;
    width: 100%;
    border: 0;
    resize: none;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.6;
    padding: 14px;
    outline: none;
    tab-size: 2;
  }

  /* Rendered preview */
  #preview {
    flex: 1;
    overflow-y: auto;
    padding: 14px 18px;
    line-height: 1.65;
    word-wrap: break-word;
  }

  /* ============================================================
     RENDERED MARKDOWN STYLES
     ============================================================ */
  #preview h1, #preview h2, #preview h3,
  #preview h4, #preview h5, #preview h6 {
    line-height: 1.25;
    margin: 1.2em 0 .5em;
  }
  #preview h1 { font-size: 1.8em; border-bottom: 1px solid var(--border); padding-bottom: .25em; }
  #preview h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: .2em; }
  #preview h3 { font-size: 1.25em; }
  #preview p { margin: .6em 0; }
  #preview a { color: var(--accent); }
  #preview code {
    background: var(--panel-2);
    padding: .15em .4em;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: .9em;
  }
  #preview pre {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    overflow-x: auto;
  }
  #preview pre code {
    background: none;
    padding: 0;
    font-size: .88em;
  }
  #preview blockquote {
    margin: .8em 0;
    padding: .2em 1em;
    border-left: 4px solid var(--accent);
    color: var(--muted);
    background: rgba(56,189,248,.06);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  }
  #preview ul, #preview ol { padding-left: 1.6em; margin: .6em 0; }
  #preview li { margin: .25em 0; }
  #preview hr {
    border: 0;
    border-top: 1px solid var(--border);
    margin: 1.4em 0;
  }
  #preview img { max-width: 100%; border-radius: var(--radius-sm); }
  #preview table { border-collapse: collapse; }

  /* ============================================================
     STATUS BAR
     ============================================================ */
  footer {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 6px 14px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    align-items: center;
  }
  footer .saved { color: var(--accent); }

  /* Small toast for copy feedback */
  #toast {
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--panel-2);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 9px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s, transform .2s;
    z-index: 50;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Mobile menu toggle - hidden on desktop */
  #menuToggle { display: none; }

  /* ============================================================
     RESPONSIVE (mobile): stack panes, collapsible sidebar
     ============================================================ */
  @media (max-width: 760px) {
    .panes { flex-direction: column; }
    .pane + .pane { border-left: 0; border-top: 1px solid var(--border); }

    #menuToggle { display: inline-block; }

    /* Sidebar becomes an overlay drawer */
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 40;
      transform: translateX(-100%);
      transition: transform .2s ease;
      box-shadow: 4px 0 18px rgba(0,0,0,.4);
    }
    .sidebar.open { transform: translateX(0); }

    header h1 .full-title { display: none; }
  }
</style>
</head>
<body>

  <!-- ===================== TOP BAR ===================== -->
  <header>
    <button id="menuToggle" title="Toggle documents">☰</button>
    <h1><span class="logo">📝</span><span class="full-title">Markdown Editor</span></h1>
    <div class="spacer"></div>
    <button id="exportMd" title="Download as .md">⬇ .md</button>
    <button id="exportHtml" title="Download standalone .html">⬇ .html</button>
    <button id="copyMd" title="Copy markdown source">⧉ MD</button>
    <button id="copyHtml" title="Copy rendered HTML">⧉ HTML</button>
  </header>

  <!-- ===================== MAIN ===================== -->
  <div class="app">

    <!-- Sidebar: list of saved documents -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <h2>Documents</h2>
        <button id="newDoc" class="btn-accent" title="New document">+ New</button>
      </div>
      <ul class="doc-list" id="docList"></ul>
    </aside>

    <!-- Split editor / preview -->
    <div class="panes">

      <!-- Editor pane -->
      <section class="pane">
        <div class="pane-head">
          <div class="toolbar">
            <button data-cmd="bold"    title="Bold (wrap **)"><b>B</b></button>
            <button data-cmd="italic"  title="Italic (wrap *)"><i>I</i></button>
            <button data-cmd="heading" title="Heading">H</button>
            <button data-cmd="code"    title="Inline code">&lt;/&gt;</button>
            <button data-cmd="fence"   title="Code block">{ }</button>
            <button data-cmd="quote"   title="Blockquote">❝</button>
            <button data-cmd="ul"      title="Bullet list">• List</button>
            <button data-cmd="ol"      title="Numbered list">1. List</button>
            <button data-cmd="link"    title="Link">🔗</button>
            <button data-cmd="image"   title="Image">🖼</button>
            <button data-cmd="hr"      title="Horizontal rule">―</button>
          </div>
        </div>
        <textarea id="editor" spellcheck="true"
          placeholder="# Start writing markdown..."></textarea>
      </section>

      <!-- Preview pane -->
      <section class="pane">
        <div class="pane-head">Preview</div>
        <div id="preview"></div>
      </section>

    </div>
  </div>

  <!-- ===================== STATUS BAR ===================== -->
  <footer>
    <span id="wordCount">0 words</span>
    <span id="charCount">0 characters</span>
    <div class="spacer" style="flex:1"></div>
    <span id="savedStatus" class="saved">Saved</span>
  </footer>

  <div id="toast"></div>

<script>
/* ============================================================
   MARKDOWN EDITOR — single-file, offline, privacy-first
   All logic is vanilla JS. No network, no external libs.
   ============================================================ */

/* ------------------------------------------------------------
   1. HTML ESCAPING (security)
   We escape &, <, > BEFORE applying any markdown so that pasted
   HTML / <script> tags are rendered as text, never executed.
   ------------------------------------------------------------ */
function escapeHtml(str) {
  return str
    .replace(/&/g, "&amp;")   // must come first
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

/* Escape characters used inside HTML attributes (href/src/alt). */
function escapeAttr(str) {
  return escapeHtml(str).replace(/"/g, "&quot;");
}

/* Only allow safe URL schemes to defuse javascript: / data: payloads.
   Allow http(s), mailto, relative paths, and anchors. */
function safeUrl(url) {
  const trimmed = (url || "").trim();
  // Reject anything starting with a dangerous scheme.
  if (/^\s*(javascript:|vbscript:|data:text\/html)/i.test(trimmed)) {
    return "#";
  }
  return trimmed;
}

/* ------------------------------------------------------------
   2. INLINE MARKDOWN
   Applied to already-HTML-escaped text. Order matters:
   images before links, code spans guarded so their contents are
   not further processed.
   ------------------------------------------------------------ */
function parseInline(text) {
  // --- Inline code: capture spans so we don't format inside them.
  // We replace each `code` with a placeholder, process the rest,
  // then restore the code spans verbatim.
  const codeSpans = [];
  text = text.replace(/`([^`]+)`/g, function (_, code) {
    codeSpans.push(code);
    return "␀CODE" + (codeSpans.length - 1) + "␀";
  });

  // --- Images: ![alt](url)   (must run before links)
  text = text.replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g, function (_, alt, url) {
    return '<img src="' + escapeAttr(safeUrl(url)) +
           '" alt="' + escapeAttr(alt) + '">';
  });

  // --- Links: [text](url)
  text = text.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, function (_, label, url) {
    return '<a href="' + escapeAttr(safeUrl(url)) +
           '" target="_blank" rel="noopener noreferrer">' + label + '</a>';
  });

  // --- Bold: **text** or __text__
  text = text.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  text = text.replace(/__([^_]+)__/g, "<strong>$1</strong>");

  // --- Italic: *text* or _text_
  text = text.replace(/\*([^*]+)\*/g, "<em>$1</em>");
  text = text.replace(/\b_([^_]+)_\b/g, "<em>$1</em>");

  // --- Restore inline code spans (escaped content, kept literal).
  text = text.replace(/␀CODE(\d+)␀/g, function (_, i) {
    return "<code>" + codeSpans[+i] + "</code>";
  });

  return text;
}

/* ------------------------------------------------------------
   3. BLOCK-LEVEL MARKDOWN PARSER
   Works line-by-line over the escaped source. Handles:
   headings, code fences, blockquotes, lists (with nesting via
   indentation), horizontal rules, and paragraphs.
   ------------------------------------------------------------ */
function parseMarkdown(src) {
  // STEP 1: escape HTML up front (sanitization).
  const escaped = escapeHtml(src);
  const lines = escaped.split(/\r?\n/);

  let html = "";       // accumulated output
  let i = 0;
  let paragraph = [];  // buffer of lines forming the current paragraph

  // Flush the pending paragraph buffer into <p>...</p>.
  function flushParagraph() {
    if (paragraph.length) {
      // Join with <br> so single newlines become soft breaks.
      html += "<p>" + parseInline(paragraph.join("<br>")) + "</p>\n";
      paragraph = [];
    }
  }

  /* --- Nested list parser ---
     Parses a contiguous run of list items starting at index `start`.
     `baseIndent` is the indentation level we're parsing at.
     Returns { html, next } where next is the line index after the list. */
  function parseList(start, baseIndent) {
    // Determine list type from the first item's marker.
    const firstMatch = lines[start].match(/^(\s*)([-*+]|\d+[.)])\s+(.*)$/);
    const ordered = /\d/.test(firstMatch[2]);
    const tag = ordered ? "ol" : "ul";
    let out = "<" + tag + ">\n";
    let idx = start;

    while (idx < lines.length) {
      const m = lines[idx].match(/^(\s*)([-*+]|\d+[.)])\s+(.*)$/);
      if (!m) break;                       // not a list line -> stop
      const indent = m[1].length;

      if (indent < baseIndent) break;      // belongs to a parent list

      if (indent > baseIndent) {
        // Deeper indentation -> nested list inside the previous <li>.
        const sub = parseList(idx, indent);
        // Splice nested list into the last <li> (before its closing tag).
        out = out.replace(/<\/li>\n$/, sub.html + "</li>\n");
        idx = sub.next;
        continue;
      }

      // Same level: emit one list item.
      out += "<li>" + parseInline(m[3]) + "</li>\n";
      idx++;
    }

    out += "</" + tag + ">\n";
    return { html: out, next: idx };
  }

  // STEP 2: walk the lines.
  while (i < lines.length) {
    const line = lines[i];

    // --- Code fence: ``` ... ``` (content kept literal, already escaped) ---
    const fence = line.match(/^```(.*)$/);
    if (fence) {
      flushParagraph();
      const codeLines = [];
      i++;
      while (i < lines.length && !/^```/.test(lines[i])) {
        codeLines.push(lines[i]);
        i++;
      }
      i++; // skip the closing fence
      html += "<pre><code>" + codeLines.join("\n") + "</code></pre>\n";
      continue;
    }

    // --- Blank line: ends the current paragraph ---
    if (/^\s*$/.test(line)) {
      flushParagraph();
      i++;
      continue;
    }

    // --- Horizontal rule: ---, ***, ___ ---
    if (/^\s*([-*_])\s*(\1\s*){2,}$/.test(line)) {
      flushParagraph();
      html += "<hr>\n";
      i++;
      continue;
    }

    // --- Heading: # .. ###### ---
    const heading = line.match(/^(#{1,6})\s+(.*)$/);
    if (heading) {
      flushParagraph();
      const level = heading[1].length;
      html += "<h" + level + ">" + parseInline(heading[2]) +
              "</h" + level + ">\n";
      i++;
      continue;
    }

    // --- Blockquote: collect consecutive '>' lines ---
    if (/^\s*>/.test(line)) {
      flushParagraph();
      const quoteLines = [];
      while (i < lines.length && /^\s*>/.test(lines[i])) {
        quoteLines.push(lines[i].replace(/^\s*>\s?/, ""));
        i++;
      }
      // Recursively parse quote contents so they can contain markdown.
      html += "<blockquote>" + parseMarkdown(unescapeForRecurse(quoteLines.join("\n"))) +
              "</blockquote>\n";
      continue;
    }

    // --- List (ordered or unordered, possibly nested) ---
    if (/^(\s*)([-*+]|\d+[.)])\s+/.test(line)) {
      flushParagraph();
      const list = parseList(i, line.match(/^(\s*)/)[1].length);
      html += list.html;
      i = list.next;
      continue;
    }

    // --- Otherwise: part of a paragraph ---
    paragraph.push(line);
    i++;
  }

  flushParagraph();
  return html;
}

/* Blockquotes recurse through parseMarkdown which re-escapes.
   Since the text is ALREADY escaped at this point, reverse the
   escaping for the recursive call so it isn't double-escaped. */
function unescapeForRecurse(str) {
  return str
    .replace(/&gt;/g, ">")
    .replace(/&lt;/g, "<")
    .replace(/&amp;/g, "&");
}

/* ============================================================
   4. DOCUMENT STORE (localStorage, multi-document)
   ============================================================ */
const STORE_KEY = "md_editor_docs_v1";
const ACTIVE_KEY = "md_editor_active_v1";

let docs = {};          // id -> { id, title, content, updated }
let activeId = null;

// Load all docs from localStorage (with graceful fallback).
function loadStore() {
  try {
    docs = JSON.parse(localStorage.getItem(STORE_KEY)) || {};
  } catch (e) {
    docs = {};
  }
  activeId = localStorage.getItem(ACTIVE_KEY);

  // If empty, create a starter document.
  if (!Object.keys(docs).length) {
    const id = createDoc("Welcome",
      "# Welcome to Markdown Editor\n\n" +
      "Type **markdown** on the left and see it _rendered_ live on the right.\n\n" +
      "## Features\n\n" +
      "- Headings, **bold**, *italic*, `inline code`\n" +
      "- Lists\n  - with nesting\n- Links & images\n\n" +
      "> Everything is saved locally in your browser.\n\n" +
      "```\ncode fences work too\n```\n\n" +
      "[Made for the offline single-page apps repo](#)");
    activeId = id;
  }
  if (!docs[activeId]) {
    activeId = Object.keys(docs)[0];
  }
}

// Persist everything.
function saveStore() {
  localStorage.setItem(STORE_KEY, JSON.stringify(docs));
  localStorage.setItem(ACTIVE_KEY, activeId);
}

// Create a new document, return its id.
function createDoc(title, content) {
  const id = "d" + Date.now() + Math.random().toString(36).slice(2, 6);
  docs[id] = {
    id: id,
    title: title || "Untitled",
    content: content || "",
    updated: Date.now()
  };
  saveStore();
  return id;
}

/* ============================================================
   5. DOM REFERENCES + UI WIRING
   ============================================================ */
const editor      = document.getElementById("editor");
const preview     = document.getElementById("preview");
const docListEl   = document.getElementById("docList");
const wordCountEl = document.getElementById("wordCount");
const charCountEl = document.getElementById("charCount");
const savedEl     = document.getElementById("savedStatus");
const sidebar     = document.getElementById("sidebar");
const toast       = document.getElementById("toast");

// Format a timestamp as a friendly "last saved" string.
function fmtTime(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  return d.toLocaleString(undefined,
    { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
}

// Render the sidebar list of documents (most recent first).
function renderDocList() {
  docListEl.innerHTML = "";
  const ids = Object.keys(docs).sort((a, b) => docs[b].updated - docs[a].updated);

  ids.forEach(id => {
    const d = docs[id];
    const li = document.createElement("li");
    li.className = "doc-item" + (id === activeId ? " active" : "");

    const title = document.createElement("div");
    title.className = "title";
    title.textContent = d.title || "Untitled";

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = fmtTime(d.updated);

    li.appendChild(title);
    li.appendChild(meta);

    // Click body -> switch document.
    li.addEventListener("click", () => switchDoc(id));

    // Double-click title -> rename.
    title.addEventListener("dblclick", (e) => { e.stopPropagation(); renameDoc(id); });

    docListEl.appendChild(li);

    // Per-item action buttons (rename / delete) shown inline.
    const actions = document.createElement("div");
    actions.style.cssText = "display:flex;gap:6px;margin-top:4px;";
    const rn = document.createElement("button");
    rn.textContent = "Rename"; rn.style.cssText = "font-size:11px;padding:2px 6px;";
    rn.addEventListener("click", (e) => { e.stopPropagation(); renameDoc(id); });
    const del = document.createElement("button");
    del.textContent = "Delete"; del.style.cssText = "font-size:11px;padding:2px 6px;";
    del.addEventListener("click", (e) => { e.stopPropagation(); deleteDoc(id); });
    actions.appendChild(rn); actions.appendChild(del);
    li.appendChild(actions);
  });
}

// Switch the active document and load its content into the editor.
function switchDoc(id) {
  if (!docs[id]) return;
  activeId = id;
  editor.value = docs[id].content;
  saveStore();
  renderDocList();
  updatePreview();
  updateCounts();
  sidebar.classList.remove("open"); // close drawer on mobile
}

// Rename via prompt (browser-native).
function renameDoc(id) {
  const name = prompt("Rename document:", docs[id].title);
  if (name !== null) {
    docs[id].title = name.trim() || "Untitled";
    docs[id].updated = Date.now();
    saveStore();
    renderDocList();
  }
}

// Delete with confirmation; ensures at least one doc remains active.
function deleteDoc(id) {
  if (!confirm('Delete "' + docs[id].title + '"? This cannot be undone.')) return;
  delete docs[id];
  if (activeId === id) {
    const remaining = Object.keys(docs);
    activeId = remaining.length ? remaining[0] : createDoc("Untitled", "");
  }
  saveStore();
  switchDoc(activeId);
}

/* ============================================================
   6. LIVE PREVIEW + COUNTS + AUTOSAVE
   ============================================================ */
function updatePreview() {
  preview.innerHTML = parseMarkdown(editor.value);
}

function updateCounts() {
  const text = editor.value;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  wordCountEl.textContent = words + (words === 1 ? " word" : " words");
  charCountEl.textContent = text.length +
    (text.length === 1 ? " character" : " characters");
}

// Debounced autosave: writes to localStorage 500ms after typing stops.
let saveTimer = null;
function scheduleSave() {
  savedEl.textContent = "Saving…";
  savedEl.classList.remove("saved");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    if (docs[activeId]) {
      docs[activeId].content = editor.value;
      docs[activeId].updated = Date.now();
      // Derive a title from the first heading / line if still default-ish.
      autoTitle(activeId);
      saveStore();
      renderDocList();
      savedEl.textContent = "Saved · " + fmtTime(docs[activeId].updated);
      savedEl.classList.add("saved");
    }
  }, 500);
}

// If the user hasn't renamed, use the first markdown line as the title.
function autoTitle(id) {
  const first = (docs[id].content.split(/\r?\n/).find(l => l.trim()) || "").trim();
  if (!first) return;
  const cleaned = first.replace(/^#+\s*/, "").slice(0, 40);
  // Only auto-set when the doc still has a placeholder-ish title.
  if (["Untitled", "Welcome", ""].includes(docs[id].title) || docs[id].auto) {
    docs[id].title = cleaned || "Untitled";
    docs[id].auto = true; // mark as auto so future edits keep updating
  }
}

// Main input handler.
editor.addEventListener("input", () => {
  updatePreview();
  updateCounts();
  scheduleSave();
});

/* ============================================================
   7. TOOLBAR (insert / wrap markdown around selection)
   ============================================================ */
// Wrap the current selection with `before`/`after`, or insert placeholder.
function wrapSelection(before, after, placeholder) {
  const start = editor.selectionStart;
  const end = editor.selectionEnd;
  const val = editor.value;
  const selected = val.slice(start, end) || placeholder || "";
  const inserted = before + selected + after;
  editor.value = val.slice(0, start) + inserted + val.slice(end);
  // Reselect the inner text for convenience.
  editor.focus();
  editor.selectionStart = start + before.length;
  editor.selectionEnd = start + before.length + selected.length;
  editor.dispatchEvent(new Event("input"));
}

// Insert text at the start of the current line (for headings/lists/quotes).
function prefixLine(prefix) {
  const start = editor.selectionStart;
  const val = editor.value;
  const lineStart = val.lastIndexOf("\n", start - 1) + 1;
  editor.value = val.slice(0, lineStart) + prefix + val.slice(lineStart);
  editor.focus();
  editor.selectionStart = editor.selectionEnd = start + prefix.length;
  editor.dispatchEvent(new Event("input"));
}

// Toolbar command dispatch table.
const commands = {
  bold:    () => wrapSelection("**", "**", "bold text"),
  italic:  () => wrapSelection("*", "*", "italic text"),
  code:    () => wrapSelection("`", "`", "code"),
  heading: () => prefixLine("# "),
  quote:   () => prefixLine("> "),
  ul:      () => prefixLine("- "),
  ol:      () => prefixLine("1. "),
  hr:      () => wrapSelection("\n\n---\n\n", "", ""),
  fence:   () => wrapSelection("\n```\n", "\n```\n", "code block"),
  link:    () => wrapSelection("[", "](https://)", "link text"),
  image:   () => wrapSelection("![", "](https://)", "alt text")
};

document.querySelectorAll(".toolbar button").forEach(btn => {
  btn.addEventListener("click", () => {
    const cmd = btn.getAttribute("data-cmd");
    if (commands[cmd]) commands[cmd]();
  });
});

// Keyboard shortcuts: Ctrl/Cmd+B bold, Ctrl/Cmd+I italic.
editor.addEventListener("keydown", (e) => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === "b") { e.preventDefault(); commands.bold(); }
    if (e.key === "i") { e.preventDefault(); commands.italic(); }
  }
  // Tab inserts two spaces instead of leaving the textarea.
  if (e.key === "Tab") {
    e.preventDefault();
    wrapSelection("  ", "", "");
  }
});

/* ============================================================
   8. EXPORT / COPY (Blob downloads + clipboard)
   ============================================================ */
// Trigger a client-side file download from a string.
function download(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Safe filename from the document title.
function fileBase() {
  return (docs[activeId].title || "document")
    .replace(/[^a-z0-9\-_ ]/gi, "").trim().replace(/\s+/g, "-") || "document";
}

// Show a transient toast message.
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 1600);
}

// Copy text to clipboard with a fallback for file:// where the
// async Clipboard API may be unavailable.
function copyText(text, label) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(() => showToast(label + " copied"))
      .catch(() => fallbackCopy(text, label));
  } else {
    fallbackCopy(text, label);
  }
}
function fallbackCopy(text, label) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); showToast(label + " copied"); }
  catch (e) { showToast("Copy failed"); }
  document.body.removeChild(ta);
}

// Build a standalone HTML file (self-contained, styled) for export.
function buildStandaloneHtml() {
  const title = escapeHtml(docs[activeId].title || "Document");
  const body = parseMarkdown(editor.value);
  return '<!DOCTYPE html>\n<html lang="en">\n<head>\n' +
    '<meta charset="UTF-8">\n' +
    '<meta name="viewport" content="width=device-width, initial-scale=1.0">\n' +
    '<title>' + title + '</title>\n' +
    '<style>\n' +
    'body{max-width:760px;margin:40px auto;padding:0 20px;' +
    'font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;' +
    'line-height:1.65;color:#1e293b;}\n' +
    'pre{background:#f1f5f9;padding:12px;border-radius:6px;overflow:auto;}\n' +
    'code{background:#f1f5f9;padding:.15em .4em;border-radius:4px;' +
    'font-family:ui-monospace,Consolas,monospace;}\n' +
    'pre code{background:none;padding:0;}\n' +
    'blockquote{border-left:4px solid #38bdf8;margin:.8em 0;padding:.2em 1em;' +
    'color:#475569;}\n' +
    'a{color:#0284c7;} img{max-width:100%;}\n' +
    'hr{border:0;border-top:1px solid #cbd5e1;}\n' +
    '</style>\n</head>\n<body>\n' + body + '\n</body>\n</html>';
}

document.getElementById("exportMd").addEventListener("click", () => {
  download(fileBase() + ".md", editor.value, "text/markdown");
});
document.getElementById("exportHtml").addEventListener("click", () => {
  download(fileBase() + ".html", buildStandaloneHtml(), "text/html");
});
document.getElementById("copyMd").addEventListener("click", () => {
  copyText(editor.value, "Markdown");
});
document.getElementById("copyHtml").addEventListener("click", () => {
  copyText(parseMarkdown(editor.value), "HTML");
});

/* ============================================================
   9. MISC UI: new doc, mobile menu toggle
   ============================================================ */
document.getElementById("newDoc").addEventListener("click", () => {
  const id = createDoc("Untitled", "");
  switchDoc(id);
  editor.focus();
});

document.getElementById("menuToggle").addEventListener("click", () => {
  sidebar.classList.toggle("open");
});

/* ============================================================
   10. INIT
   ============================================================ */
loadStore();
editor.value = docs[activeId].content;
renderDocList();
updatePreview();
updateCounts();
savedEl.textContent = "Saved · " + fmtTime(docs[activeId].updated);
savedEl.classList.add("saved");
</script>
